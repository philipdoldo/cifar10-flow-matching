effective_batch_size: 1024
batch_size: 128
grad_accum_steps: 1
training_steps: 10000

# Cosine Decay LR Schedule
max_lr: 3e-4
min_lr: 3e-5
warmup_steps: 100

# CFG
eta: 0.0909  # probability of use null class label during training
null_label: 10

val_loss_interval: 50
checkpoint_interval: 10000

# generating images periodically during training
image_sample_interval: 500
num_image_samples: 10
cfg_weight: 4.0
forward_euler_steps: 100

save_dir: "/mnt/data_r60_1/adv_robust_project/mnist-flow-model/experiments"

model:
  channels: 3
  initial_image_height: 32
  min_image_height: 4
  max_attention_height: 16
  base_channels: 64
  d: 128 # time/class embedding dimension
  time_and_class_mlp_hidden_dim: null
  num_classes: 10
  sinusoidal_base: 10000
  dropout: 0.0
  attention_heads: 4